<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Call — Dan James</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #030806;
            background-image:
                radial-gradient(ellipse 70% 40% at 50% -5%, rgba(18, 60, 32, 0.5) 0%, transparent 55%),
                radial-gradient(ellipse 50% 30% at 50% 105%, rgba(12, 45, 22, 0.3) 0%, transparent 55%);
            color: #e8f0ea;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .header img {
            height: 48px;
            width: auto;
            display: block;
        }

        /* ── HR Divider ── */
        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }

        /* ── Hero ── */
        .hero {
            max-width: 720px;
            margin: 0 auto;
            padding: 72px 24px 48px;
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(42, 120, 70, 0.18);
            border: 1px solid rgba(60, 160, 90, 0.3);
            border-radius: 100px;
            padding: 6px 18px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #5dd98a;
            margin-bottom: 36px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            background: #5dd98a;
            border-radius: 50%;
            box-shadow: 0 0 6px #5dd98a;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .headline {
            font-size: clamp(30px, 5.5vw, 52px);
            font-weight: 800;
            line-height: 1.13;
            letter-spacing: -0.025em;
            color: #ffffff;
            margin-bottom: 0;
        }

        .headline .green {
            color: #4cd97b;
        }

        /* ── Calendly wrapper ── */
        .content {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 24px 88px;
        }

        .calendly-block {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        /* ── Footer ── */
        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            padding: 28px 24px;
            text-align: center;
        }

        .footer img {
            height: 28px;
            width: auto;
            opacity: 0.5;
        }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .hero {
                padding: 52px 20px 40px;
            }

            .content {
                padding: 0 16px 64px;
            }
        }
    </style>
</head>
<body>

    <!-- ── Header ── -->
    <header class="header">
        <img src="Lincko-logo.png" alt="Lincko" onerror="this.style.display='none'">
    </header>

    <hr class="divider">

    <!-- ── Hero ── -->
    <section class="hero">

        <div class="badge">
            <span class="badge-dot"></span>
            Book Your Call
        </div>

        <h1 class="headline">Pick Your Best Time<br>For <span class="green">Our Call</span></h1>

    </section>

    <!-- ── Calendly ── -->
    <div class="content">
        <div class="calendly-block">
            <!-- Calendly inline widget begin -->
            <div class="calendly-inline-widget" data-url="https://calendly.com/danjames765/d100-meeting" style="min-width:280px;height:700px;"></div>
            <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
            <!-- Calendly inline widget end -->
        </div>
    </div>

    <!-- ── Footer ── -->
    <footer class="footer">
        <img src="Lincko-logo.png" alt="Lincko" onerror="this.style.display='none'">
    </footer>

</body>
</html>
